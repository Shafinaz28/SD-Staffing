<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs | SD Staffing</title>
  <script>
    (function () {
      // Live Server (port 5500) cannot run PHP — use XAMPP for the real jobs page
      var xamppJobs = 'http://localhost/SDstaffing/job.php';
      var onLiveServer = location.port === '5500';
      var onXampp = location.hostname === 'localhost' && location.pathname.indexOf('/SDstaffing') !== -1;

      if (onLiveServer) {
        location.replace(xamppJobs);
        return;
      }
      if (onXampp) {
        location.replace('job.php' + location.search + location.hash);
        return;
      }
      location.replace(xamppJobs);
    })();
  </script>
</head>
<body>
  <p>Opening jobs on XAMPP… <a href="http://localhost/SDstaffing/job.php">Click here</a> if you are not redirected.</p>
  <p class="text-sm" style="font-family:sans-serif;color:#64748b;max-width:32rem;">
    Live Server (port 5500) only shows static HTML. Start Apache + MySQL in XAMPP, then use
    <strong>http://localhost/SDstaffing/job.php</strong> or double-click <strong>start-website.bat</strong>.
  </p>
</body>
</html>
