<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login | SD Staffing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="16x16" href="images/SD LOGO_ENHANCED PNG.png">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: { sd: { pink: 'rgb(233, 30, 99)', dark: '#0f172a', blue: 'rgb(66, 165, 245)' } }
        }
      }
    };
  </script>
  <style>
    .login-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    .login-input:focus {
      border-color: rgba(233, 30, 99, .65);
      box-shadow: 0 0 0 4px rgba(233, 30, 99, .12);
    }
    .field-wrap { position: relative; }
    .field-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sd-pink/10 via-slate-50 to-sd-blue/10 min-h-screen flex items-center justify-center p-6 font-sans">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="images/SD LOGO_ENHANCED PNG.png" alt="SD Staffing" class="h-14 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-slate-900">Admin Login</h1>
      <!-- <p class="text-sm text-slate-500 mt-1">Sign in to post and manage job openings</p> -->
    </div>

    <div id="alertLogout" class="hidden mb-4 p-4 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold text-center">
      You have been logged out.
    </div>
    <div id="alertError" class="hidden mb-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-semibold text-center">
      Invalid username or password.
    </div>
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden p-6 md:p-8 text-center">
      <p class="text-slate-700 font-semibold mb-2">Admin panel unavailable</p>
      <p class="text-sm text-slate-500 mb-6">This site runs as static HTML only. Job listings are managed in <a href="job.html" class="text-sd-pink font-bold hover:underline">job.html</a>.</p>
      <a href="index.html" class="inline-block bg-sd-pink hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-2xl transition">Back to website</a>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    if (p.get('error') === '1') document.getElementById('alertError').classList.remove('hidden');
    if (p.get('error') === 'db') document.getElementById('alertDb').classList.remove('hidden');
    if (p.get('logout') === '1') document.getElementById('alertLogout').classList.remove('hidden');
    if (p.get('error') || p.get('logout')) history.replaceState({}, '', 'admin-login.html');
  </script></body>
</html>
